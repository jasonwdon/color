
<!DOCTYPE html>
<html lang="en">
	<head>

    <!--Set up tab stuff-->
		<title>Color</title>
		<link rel="shortcut icon" type="image/x-icon" href="resources/favicon.ico"/>

    <!--Metadata-->
    <meta http-equiv="content-type" content="text/html; charset=utf-8"/>

		<!--For that annoying error because wired-elements is broken-->
		<script>
			function safeDecorator(fn) {
				return function(...args) {
					try {return fn.apply(this, args);} 
					catch (error) { if ( error instanceof DOMException && error.message.includes('has already been used with this registry')) {
							return false;
						}
						throw error;
					}
				};
			}
			customElements.define = safeDecorator(customElements.define);
		</script>

    <!--Fonts-->
		<link href="https://fonts.googleapis.com/css?family=Gaegu" rel="stylesheet">

    <!--Load resources-->
		<link rel="stylesheet" type="text/css" href="css/style.css"/>
		<script type="module" src="js/color.js"></script>
    <script type="module" src="https://unpkg.com/wired-elements?module"></script>

	</head>

	<body>
		<div id="sandbox"></div>
	</body>

</html>
